<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebScan API Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #4ce1d3;
        --text: #D1E8E2;
        --bg-dark: #051311;
        --border: rgba(76, 225, 211, 0.15);
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 50%, #0b2422 0%, var(--bg-dark) 100%);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        position: relative;
        overflow: hidden;
      }
      .overlay {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(209, 232, 226, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(209, 232, 226, 0.015) 1px, transparent 1px);
        background-size: 80px 80px;
        pointer-events: none;
        z-index: 1;
      }
      section {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(8, 24, 21, 0.78);
        border: 1px solid var(--border);
        box-shadow: 
          0 20px 50px rgba(0, 0, 0, 0.65),
          0 0 35px rgba(76, 225, 211, 0.05);
        border-radius: 12px;
        padding: 3rem 2.5rem;
        max-width: 600px;
        width: 90%;
        backdrop-filter: blur(18px);
        text-align: center;
        box-sizing: border-box;
      }
      .brand-link {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        text-decoration: none;
        color: var(--primary);
        margin-bottom: 2rem;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .brand-link:hover {
        transform: scale(1.03);
      }
      .brand-link img {
        width: 3rem;
        height: auto;
        filter: drop-shadow(0 2px 8px rgba(76, 225, 211, 0.3));
      }
      .brand-link h1 {
        margin: 0;
        font-size: 2.2rem;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--primary);
        font-family: 'Outfit', sans-serif;
      }
      .message {
        font-size: 1.05rem;
        line-height: 1.6;
        margin-bottom: 2rem;
        font-family: 'Source Code Pro', monospace;
        width: 100%;
        word-wrap: break-word;
      }
      .message code {
        color: var(--primary);
        background: rgba(76, 225, 211, 0.08);
        border: 1px solid rgba(76, 225, 211, 0.2);
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.92rem;
        word-break: break-all;
      }
      .message pre {
        background: #040e0c;
        border: 1px solid var(--border);
        padding: 1rem;
        border-radius: 8px;
        font-size: 0.88rem;
        color: #a3ebd2;
        overflow-x: auto;
        text-align: left;
        margin: 1.25rem 0 0 0;
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
      }
      .message a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
        border-bottom: 1px dashed var(--primary);
        transition: all 0.2s ease;
      }
      .message a:hover {
        color: #fff;
        border-bottom-style: solid;
        text-shadow: 0 0 8px rgba(76, 225, 211, 0.5);
      }
      .footer {
        border-top: 1px solid rgba(209, 232, 226, 0.08);
        padding-top: 1.5rem;
        width: 100%;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: rgba(209, 232, 226, 0.6);
        font-family: 'Source Code Pro', monospace;
        flex-wrap: wrap;
      }
      .footer a {
        color: var(--primary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .footer a:hover {
        color: #fff;
      }

      /* Responsive Media Queries */
      @media (max-width: 580px) {
        body {
          padding: 1rem;
          align-items: flex-start;
          padding-top: 10vh;
        }
        section {
          padding: 2rem 1.25rem;
          width: 100%;
          border-radius: 10px;
        }
        .brand-link {
          margin-bottom: 1.5rem;
          gap: 0.6rem;
        }
        .brand-link img {
          width: 2.4rem;
        }
        .brand-link h1 {
          font-size: 1.75rem;
        }
        .message {
          font-size: 0.95rem;
          margin-bottom: 1.5rem;
        }
        .message pre {
          font-size: 0.82rem;
          padding: 0.75rem;
        }
        .footer {
          flex-direction: column;
          gap: 0.35rem;
          padding-top: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay"></div>
    <section>
      <a class="brand-link" href="/">
        <img src="/logo-icon-transparent.png" alt="WebScan Logo" />
        <h1>WebScan</h1>
      </a>
      <div class="message">
        <!-- CONTENT -->
      </div>
      <div class="footer">
        <span>Docs and Source:</span>
        <a href="https://github.com/Mohammed-razin-cr/Web-Scan" target="_blank" rel="noreferrer">github.com/Mohammed-razin-cr/Web-Scan</a>
      </div>
    </section>
  </body>
</html>
